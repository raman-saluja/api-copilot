version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - api-copilot-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - api-copilot-uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  api-copilot-uploads: